  <!-- Dynamic Lazy Loader for Third-Party Analytics (GA4 & Clarity) -->
  <script type="text/javascript">
    (function() {
      let scriptsLoaded = false;
      function loadThirdPartyScripts() {
        if (scriptsLoaded) return;
        scriptsLoaded = true;

        // 1. Google Analytics (GA4 / GTM)
        const gaScript = document.createElement('script');
        gaScript.async = true;
        gaScript.src = "https://www.googletagmanager.com/gtag/js?id=G-H7S6KCPB3X";
        document.head.appendChild(gaScript);

        const gaInit = document.createElement('script');
        gaInit.textContent = `
          window.dataLayer = window.dataLayer || [];
          function gtag() { dataLayer.push(arguments); }
          gtag('js', new Date());
          gtag('config', 'G-H7S6KCPB3X', { 'anonymize_ip': true });
        `;
        document.head.appendChild(gaInit);

        // 2. Microsoft Clarity
        const clarityScript = document.createElement('script');
        clarityScript.type = "text/javascript";
        clarityScript.textContent = `
          (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
          })(window, document, "clarity", "script", "pxc3v86m4w");
        `;
        document.head.appendChild(clarityScript);

        cleanupListeners();
      }

      const events = ['mousedown', 'keydown', 'scroll', 'touchstart'];
      function cleanupListeners() {
        events.forEach(e => window.removeEventListener(e, loadThirdPartyScripts));
      }

      // Initialize on first user interaction
      events.forEach(e => window.addEventListener(e, loadThirdPartyScripts, { passive: true }));

      // Fallback: Load after 4s load idle time
      window.addEventListener('load', () => {
        if (window.requestIdleCallback) {
          requestIdleCallback(() => setTimeout(loadThirdPartyScripts, 4000));
        } else {
          setTimeout(loadThirdPartyScripts, 4000);
        }
      });
    })();
  </script>
